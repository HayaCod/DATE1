<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <link rel="manifest" href="/DATE1/manifest.json">
<link rel="apple-touch-icon" href="/DATE1/IMG_20260623_013436.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ساعت مینیمال بدون عدد | تقویم سهگانه</title>
    <style>
        /* -------------------- Reset & Base -------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #E8E4DC;
            background-image: radial-gradient(circle at 30% 40%, #F5F2EB 0%, #DFDBD2 100%);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', system-ui, sans-serif;
            padding: 20px;
            position: relative;
        }

        /* -------------------- کارت اصلی -------------------- */
        .clock-master {
            max-width: 950px;
            width: 100%;
            background: rgba(245, 242, 235, 0.65);
            backdrop-filter: blur(12px) saturate(1.2);
            -webkit-backdrop-filter: blur(12px) saturate(1.2);
            border-radius: 68px;
            padding: 40px 45px 50px;
            box-shadow: 
                0 30px 60px -20px rgba(44, 46, 51, 0.15),
                inset 0 1px 2px rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
        }

        /* -------------------- چیدمان اصلی -------------------- */
        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 0.9fr 0.4fr;
            align-items: start;
            gap: 10px;
        }

        /* ========== بخش ۱: ساعت کلاسیک (بدون عدد) ========== */
        .analog-section {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 25px;
        }

        .clock-face {
            position: relative;
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1/1;
            background: #FCF9F4;
            border-radius: 50%;
            box-shadow: 
                0 15px 35px rgba(44, 46, 51, 0.08),
                inset 0 -8px 15px rgba(0,0,0,0.02),
                inset 0 8px 20px rgba(255, 255, 255, 0.8);
            border: 12px solid #2C2E33;
            transition: box-shadow 0.3s;
        }

        /* عقربهها */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(0deg);
            border-radius: 40px;
            transition: transform 0.1s cubic-bezier(0.4, 2.08, 0.55, 0.44);
        }
        .hand--hour {
            width: 7px;
            height: 28%;
            background: #1E1F22;
            z-index: 3;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.2);
        }
        .hand--minute {
            width: 5px;
            height: 36%;
            background: #2F3238;
            z-index: 4;
        }
        .hand--second {
            width: 2.5px;
            height: 38%;
            background: #C67B4B;
            z-index: 5;
            opacity: 0.9;
        }
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 14px;
            height: 14px;
            background: #C67B4B;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 0 0 4px #FCF9F4, 0 0 0 6px #2C2E33;
        }

        /* ===== BTS ===== */
        .bts-brand {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            font-size: clamp(2.5rem, 5vw, 4.2rem);
            font-weight: 900;
            letter-spacing: 16px;
            color: #C67B4B;
            text-shadow: 
                0 2px 4px rgba(198, 123, 75, 0.15),
                0 8px 24px rgba(198, 123, 75, 0.08);
            line-height: 1.1;
            text-align: center;
            transform: scaleX(1.02);
            transition: all 0.3s ease;
            position: relative;
            padding: 0 10px;
        }
        .bts-brand::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 25%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #C67B4B, transparent);
            opacity: 0.3;
            border-radius: 4px;
        }
        .bts-brand:hover {
            letter-spacing: 20px;
            text-shadow: 0 4px 12px rgba(198, 123, 75, 0.25);
        }

        /* ========== بخش ۲: ستون دیجیتال (بدون برچسب) ========== */
        .digital-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: flex-start;
            padding-right: 5px;
            direction: ltr;
            font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
        }

        .digital-item {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 50px;
            border-left: 3px solid #C67B4B;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.25s ease;
            min-height: 55px;
        }
        .digital-item:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: translateX(-4px);
        }

        .digital-value {
            font-size: clamp(2rem, 4.5vw, 3.5rem);
            font-weight: 300;
            color: #2C2E33;
            line-height: 1.2;
            font-variant-numeric: tabular-nums;
            letter-spacing: 3px;
        }
        .digital-item--seconds .digital-value {
            color: #C67B4B;
            text-shadow: 0 0 1px rgba(198, 123, 75, 0.2);
        }

        /* ===== تقویم سهگانه (بدون برچسب، بزرگ و بولد) ===== */
        .calendar-triple {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(44, 46, 51, 0.08);
            display: flex;
            flex-direction: column;
            gap: 8px;
            direction: ltr;
        }

        .calendar-item {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 6px 10px;
            font-size: clamp(0.9rem, 1.4vw, 1.2rem);
            font-weight: 700;
            color: #2C2E33;
            letter-spacing: 0.5px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.15);
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .calendar-item:hover {
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(198, 123, 75, 0.2);
        }

        .calendar-date {
            font-family: 'JetBrains Mono', 'SF Mono', monospace;
            font-weight: 700;
            color: #2C2E33;
            font-size: clamp(0.9rem, 1.4vw, 1.2rem);
            letter-spacing: 0.8px;
        }

        /* ========== بخش ۳: روزهای هفته ========== */
        .weekdays-row {
            grid-column: 1 / -1;
            margin-top: 28px;
            padding-top: 22px;
            border-top: 1px solid rgba(44, 46, 51, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px 0;
        }

        .weekday-item {
            flex: 1;
            text-align: center;
            font-size: clamp(0.8rem, 1.3vw, 1.2rem);
            font-weight: 400;
            color: #A39A90;
            padding: 6px 0;
            border-radius: 40px;
            transition: all 0.25s ease;
            letter-spacing: 0.8px;
            background: transparent;
            position: relative;
        }
        .weekday-item.active {
            background: #2C2E33;
            color: #F5F2EB;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(44, 46, 51, 0.12);
            transform: scale(1.02);
        }
        .weekday-item:not(.active)::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 20%;
            width: 60%;
            height: 1px;
            background: rgba(44, 46, 51, 0.08);
            transition: width 0.2s;
        }
        .weekday-item:not(.active):hover::after {
            width: 80%;
            background: #C67B4B;
        }

        /* ========== امضای طراح ========== */
        .designer-signature {
            position: absolute;
            bottom: 18px;
            right: 30px;
            font-family: 'JetBrains Mono', 'SF Mono', 'Courier New', monospace;
            font-size: clamp(0.55rem, 0.8vw, 0.75rem);
            font-weight: 400;
            color: #A39A90;
            letter-spacing: 0.5px;
            opacity: 0.7;
            direction: ltr;
            text-align: right;
            line-height: 1.6;
            transition: opacity 0.3s ease;
            background: rgba(255, 255, 255, 0.3);
            padding: 6px 14px 6px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .designer-signature:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.6);
        }
        .designer-signature .name {
            font-weight: 600;
            color: #2C2E33;
        }
        .designer-signature .phone {
            font-weight: 300;
            color: #8A7E74;
            letter-spacing: 1px;
        }

        /* ========== واکنشگرایی ========== */
        @media (max-width: 780px) {
            .clock-master {
                padding: 28px 20px 65px;
                border-radius: 48px;
            }
            .layout-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .clock-face {
                max-width: 280px;
                margin: 0 auto;
            }
            .bts-brand {
                font-size: clamp(2.2rem, 8vw, 3.5rem);
                letter-spacing: 12px;
            }
            .digital-stack {
                flex-direction: row;
                justify-content: space-around;
                padding-right: 0;
                flex-wrap: wrap;
            }
            .digital-item {
                flex: 1;
                min-width: 70px;
                align-items: center;
                border-left: none;
                border-bottom: 3px solid #C67B4B;
                border-radius: 20px;
                padding: 10px 8px;
                min-height: 45px;
            }
            .digital-value {
                font-size: 1.8rem;
            }
            .calendar-triple {
                flex-direction: row;
                justify-content: space-around;
                gap: 5px;
                margin-top: 12px;
                padding-top: 10px;
                width: 100%;
                flex-wrap: wrap;
            }
            .calendar-item {
                padding: 4px 12px;
                font-size: 0.8rem;
                flex: 1;
                min-width: 80px;
            }
            .calendar-date {
                font-size: 0.8rem;
            }
            .weekdays-row {
                gap: 2px;
            }
            .weekday-item {
                font-size: 0.7rem;
                padding: 4px 0;
            }
            .designer-signature {
                bottom: 12px;
                right: 16px;
                font-size: 0.5rem;
                padding: 4px 10px;
            }
        }

        @media (max-width: 480px) {
            .clock-face {
                max-width: 220px;
                border-width: 8px;
            }
            .bts-brand {
                font-size: 2rem;
                letter-spacing: 8px;
            }
            .digital-item {
                min-width: 55px;
                padding: 6px 4px;
                min-height: 38px;
            }
            .digital-value {
                font-size: 1.3rem;
                letter-spacing: 1px;
            }
            .calendar-item {
                font-size: 0.65rem;
                padding: 3px 8px;
                min-width: 60px;
            }
            .calendar-date {
                font-size: 0.65rem;
            }
            .weekday-item {
                font-size: 0.55rem;
            }
            .designer-signature {
                bottom: 8px;
                right: 10px;
                font-size: 0.4rem;
                padding: 3px 8px;
            }
        }
    </style>
</head>
<body>

<div class="clock-master">
    <div class="layout-grid">

        <!-- ========== ساعت کلاسیک (بدون عدد) + BTS ========== -->
        <div class="analog-section">
            <div class="clock-face" id="analogClock">
                <div class="hand hand--hour" id="hourHand"></div>
                <div class="hand hand--minute" id="minuteHand"></div>
                <div class="hand hand--second" id="secondHand"></div>
                <div class="center-dot"></div>
            </div>
            <div class="bts-brand">BTS</div>
        </div>

        <!-- ========== ستون دیجیتال (بدون برچسب) + تقویم سه ردیفی ========== -->
        <div class="digital-stack">
            <!-- ساعت -->
            <div class="digital-item digital-item--hours">
                <span class="digital-value" id="digitalHours">00</span>
            </div>
            <!-- دقیقه -->
            <div class="digital-item digital-item--minutes">
                <span class="digital-value" id="digitalMinutes">00</span>
            </div>
            <!-- ثانیه -->
            <div class="digital-item digital-item--seconds">
                <span class="digital-value" id="digitalSeconds">00</span>
            </div>

            <!-- تقویم سهگانه (بدون برچسب، بزرگ و بولد) -->
            <div class="calendar-triple">
                <div class="calendar-item">
                    <span class="calendar-date" id="shamsiDate">--/--/----</span>
                </div>
                <div class="calendar-item">
                    <span class="calendar-date" id="miladiDate">--/--/----</span>
                </div>
                <div class="calendar-item">
                    <span class="calendar-date" id="qamariDate">--/--/----</span>
                </div>
            </div>
        </div>

        <!-- ========== روزهای هفته ========== -->
        <div class="weekdays-row" id="weekdaysRow"></div>

    </div>

    <!-- ========== امضای طراح ========== -->
    <div class="designer-signature">
        <span class="name">Design by Hiwa Mohamadi</span><br>
        <span class="phone">09188740756</span>
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ----- ۱. کشیدن المانها -----
        const clockFace = document.getElementById('analogClock');
        const hourHand = document.getElementById('hourHand');
        const minuteHand = document.getElementById('minuteHand');
        const secondHand = document.getElementById('secondHand');
        const digitalHours = document.getElementById('digitalHours');
        const digitalMinutes = document.getElementById('digitalMinutes');
        const digitalSeconds = document.getElementById('digitalSeconds');
        const weekdaysRow = document.getElementById('weekdaysRow');
        const shamsiDate = document.getElementById('shamsiDate');
        const miladiDate = document.getElementById('miladiDate');
        const qamariDate = document.getElementById('qamariDate');

        // ----- ۲. حذف تمام اعداد (ساعت بدون عدد) -----
        // هیچ عددی روی ساعت رسم نمیشود

        // ----- ۳. روزهای هفته -----
        const weekDaysPersian = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'];

        function buildWeekdays() {
            weekdaysRow.innerHTML = '';
            weekDaysPersian.forEach((dayName) => {
                const div = document.createElement('div');
                div.className = 'weekday-item';
                div.textContent = dayName;
                weekdaysRow.appendChild(div);
            });
        }
        buildWeekdays();

        // ----- ۴. توابع تبدیل تقویم -----
        function toPersianDate(date) {
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', calendar: 'persian' };
            return new Intl.DateTimeFormat('fa-IR', options).format(date);
        }

        function toIslamicDate(date) {
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', calendar: 'islamic' };
            return new Intl.DateTimeFormat('ar-SA-u-ca-islamic', options).format(date);
        }

        function toGregorianDate(date) {
            const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
            return new Intl.DateTimeFormat('en-US', options).format(date);
        }

        // ----- ۵. تابع بروزرسانی زمان و تقویم -----
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const milliseconds = now.getMilliseconds();

            // عقربهها
            const secDeg = ((seconds + milliseconds / 1000) / 60) * 360;
            const minDeg = ((minutes + seconds / 60) / 60) * 360;
            const hourDeg = ((hours % 12) + minutes / 60 + seconds / 3600) * 30;

            secondHand.style.transform = `translateX(-50%) rotate(${secDeg}deg)`;
            minuteHand.style.transform = `translateX(-50%) rotate(${minDeg}deg)`;
            hourHand.style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;

            // دیجیتال
            const hh = String(hours).padStart(2, '0');
            const mm = String(minutes).padStart(2, '0');
            const ss = String(seconds).padStart(2, '0');
            digitalHours.textContent = hh;
            digitalMinutes.textContent = mm;
            digitalSeconds.textContent = ss;

            // تقویم سهگانه
            shamsiDate.textContent = toPersianDate(now);
            miladiDate.textContent = toGregorianDate(now);
            qamariDate.textContent = toIslamicDate(now);

            // روز جاری
            const todayIndex = now.getDay();
            let persianIndex;
            if (todayIndex === 0) persianIndex = 1;
            else if (todayIndex === 6) persianIndex = 0;
            else persianIndex = todayIndex + 1;

            const weekItems = weekdaysRow.querySelectorAll('.weekday-item');
            weekItems.forEach((item, idx) => {
                item.classList.remove('active');
                if (idx === persianIndex) {
                    item.classList.add('active');
                }
            });
        }

        // ----- ۶. حلقه با requestAnimationFrame -----
        let animationFrameId = null;

        function tick() {
            updateClock();
            animationFrameId = requestAnimationFrame(tick);
        }
        tick();

        // ----- ۷. بهینهسازی با Page Visibility API -----
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
            } else {
                if (!animationFrameId) {
                    tick();
                }
            }
        });

        console.log('✅ ساعت بدون عدد با موفقیت بارگذاری شد.');
    })();
</script>

</body>
</html>
